<button mat-raised-button color="accent" (click)="submit()" *ngIf="pageMode == PageMode.CREATE">ثبت</button>
<form [formGroup]="form">
    <mat-form-field>
        <mat-label>متن</mat-label>
        <textarea formControlName="text" matInput maxlength="1024" rows="10"></textarea>
        <mat-error *ngIf="text.invalid && text.errors?.['pattern']">{{patternErrorMsg}}</mat-error>
    </mat-form-field>
</form>
