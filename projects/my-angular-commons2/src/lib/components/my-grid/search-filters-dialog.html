<h2 mat-dialog-title>جستجو</h2>
<mat-dialog-content class="mat-typography" style="width: 500px;">
  <form [formGroup]="filters" *ngIf="filterConfig">
    <div style="overflow-y: hidden;" *ngFor="let conf of filterConfig; index as i">
      <mat-form-field *ngIf="conf.type == FilterType.TEXT" >
        <mat-label >{{conf.label}}</mat-label>
        <input tabindex="i" [formControlName]="conf.name" (keyup.enter)="applyFilter()" matInput type="text" />
      </mat-form-field>
      
      <mat-slide-toggle *ngIf="conf.type == FilterType.TOGGLE" [checked]="conf.name" [formControlName]="conf.name">
          {{conf.label}}
      </mat-slide-toggle>

      <mat-form-field *ngIf="conf.type == FilterType.MULTI_SELECT">
        <mat-label>{{conf.label}}</mat-label>
        <mat-select [formControlName]="conf.name" multiple>
          
          @for (value of conf.values | async; track value) {
            <mat-option [value]="value.key">{{value.value}}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field *ngIf="conf.type == FilterType.DATE_RANGE" >
        <mat-label>{{conf.label}}</mat-label>
        <mat-date-range-input [formGroupName]="conf.name" [rangePicker]="picker">
          <input matStartDate formControlName="start" placeholder="از تاریخ">
          <input matEndDate formControlName="end" placeholder="تا تاریخ">
        </mat-date-range-input>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>

      </mat-form-field> 
    </div>
  </form>  
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="close()">انصراف</button>
  <button matButton (click)="cancelFilter()" >لغو فیلتر</button>
  <button matButton (click)="applyFilter()" color="primary">اعمال فیلتر</button>
</mat-dialog-actions>
