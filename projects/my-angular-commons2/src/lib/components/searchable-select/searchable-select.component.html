    <mat-form-field>
      <mat-select [required]="required" [formControl]="selectControl" [placeholder]="placeholder"
        (selectionChange)="callSelectionChange()" #singleSelect>
        <mat-option>
          <ngx-mat-select-search [formControl]="selectSearchControl"
            placeholderLabel="جستجو" noEntriesFoundLabel="یافت نشد"></ngx-mat-select-search>
        </mat-option>
  
        <mat-option *ngFor="let option of filteredOptions | async" [value]="option.id">
          {{option.persianTitle}}
        </mat-option>
      </mat-select>
    </mat-form-field>
